apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: thanu-ns1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:7-jammy
        ports:
          - containerPort: 27017
        resources:
          requests: 
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "130Mi" 
            cpu: "200m"
        volumeMounts:
          - name: mongodb-storage
            mountPath: /data/db  
      volumes:
        - name: mongodb-storage
          hostPath: 
            path: /ust-data
            type: DirectoryorCreate
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: thanu-ns1
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
  type: ClusterIP
 
 